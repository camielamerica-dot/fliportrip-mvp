<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jullie Trip Resultaten | Flip 2 Trip</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --obsidian: #161B22; --indigo: #1e293b; --accent: #2D6A4F; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--indigo); margin: 0; padding: 0; }
        
        header { background: white; padding: 40px 5%; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .logo { height: 50px; margin-bottom: 20px; }
        
        .container { max-width: 800px; margin: -40px auto 100px; padding: 0 20px; }
        
        /* Stats Card */
        .stats-banner { 
            background: var(--indigo); color: white; border-radius: 24px; padding: 30px; 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .stat-item span { display: block; font-size: 24px; font-weight: 800; color: #fff; }
        .stat-item small { opacity: 0.7; font-size: 12px; text-transform: uppercase; }

        /* Match Cards */
        .match-card { 
            background: white; border-radius: 24px; overflow: hidden; margin-top: 30px;
            display: flex; flex-direction: column; border: 1px solid rgba(0,0,0,0.03);
            transition: 0.3s;
        }
        .match-card:hover { transform: translateY(-5px); box-shadow: 0 30px 60px rgba(0,0,0,0.08); }
        
        .match-img { width: 100%; height: 250px; object-fit: cover; }
        .match-content { padding: 30px; }
        
        .badge { background: #f1f5f9; color: var(--indigo); padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; }
        .price-tag { float: right; color: var(--accent); font-weight: 800; font-size: 18px; }
        
        h2 { font-size: 24px; margin: 15px 0; letter-spacing: -1px; }
        p { color: #64748b; line-height: 1.6; margin-bottom: 25px; }

        .btn-book { 
            background: var(--accent); color: white; text-decoration: none; 
            padding: 18px; border-radius: 14px; display: block; text-align: center;
            font-weight: 800; transition: 0.3s; font-size: 16px;
        }
        .btn-book:hover { filter: brightness(1.1); }

        .dna-section { text-align: center; margin: 60px 0 20px; }
        .dna-tag { display: inline-block; background: white; border: 1px solid #e2e8f0; padding: 8px 16px; border-radius: 50px; margin: 5px; font-size: 13px; font-weight: 600; }

        footer { text-align: center; padding: 40px; color: #94a3b8; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <img src="https://wijzijnvalkenburg.nl/wp-content/uploads/2026/03/Flip2Trip-logo-landscape.png" class="logo">
    <h1>Jullie Perfecte Match in Valkenburg</h1>
</header>

<div class="container">
    <div class="stats-banner">
        <div class="stat-item"><span id="total-matches">0</span><small>Activiteiten</small></div>
        <div class="stat-item"><span id="group-score">94%</span><small>Groeps-DNA</small></div>
        <div class="stat-item"><span id="trip-id">...</span><small>Trip Nummer</small></div>
    </div>

    <div class="dna-section">
        <p>Gebaseerd op jullie swipes houdt deze groep van:</p>
        <div id="dna-tags"></div>
    </div>

    <div id="results-list">
        </div>

    <footer>
        <p>&copy; 2026 Flip 2 Trip. De getoonde prijzen zijn indicatief.<br>Sommige boekingen leveren ons een kleine commissie op, hiermee houden we de app gratis!</p>
    </footer>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { apiKey: "AIzaSyAx_XDqOW9hth7dwSFBZYJnk_dTa2lnvQ0", authDomain: "fliportrip-valkenburg.firebaseapp.com", projectId: "fliportrip-valkenburg" };
    const app = initializeApp(config);
    const db = getFirestore(app);

    async function loadResults() {
        const params = new URLSearchParams(window.location.search);
        const tripId = params.get('trip');
        if(!tripId) return;

        document.getElementById('trip-id').innerText = tripId;

        // 1. Haal de kamer op
        const roomSnap = await getDoc(doc(db, "rooms", tripId));
        if(!roomSnap.exists()) return;
        const room = roomSnap.data();

        // 2. Haal alle activiteiten op (om details te matchen)
        const actSnap = await getDocs(collection(db, "activities"));
        const allActs = {};
        actSnap.forEach(d => allActs[d.id] = d.data());

        // 3. Render DNA Tags
        document.getElementById('dna-tags').innerHTML = (room.groupInterests || [])
            .map(t => `<span class="dna-tag">✨ ${t}</span>`).join('');

        // 4. Sorteer en toon resultaten
        const votes = room.votes || {};
        const sorted = Object.keys(votes).sort((a,b) => votes[b] - votes[a]);
        
        document.getElementById('total-matches').innerText = sorted.length;

        const list = document.getElementById('results-list');
        list.innerHTML = sorted.map(id => {
            const a = allActs[id];
            if(!a) return '';
            return `
                <div class="match-card">
                    <img src="${a.image}" class="match-img">
                    <div class="match-content">
                        <span class="price-tag">${a.price || '€ -'}</span>
                        <span class="badge">${a.category}</span>
                        <h2>${a.title}</h2>
                        <p>${a.desc || 'Geen beschrijving beschikbaar.'}</p>
                        ${a.bookingUrl ? 
                            `<a href="${a.bookingUrl}" target="_blank" class="btn-book">Reserveer direct plek</a>` : 
                            `<span style="color:#94a3b8; font-size:14px;">Geen online boeking beschikbaar</span>`
                        }
                    </div>
                </div>
            `;
        }).join('');
    }

    loadResults();
</script>
</body>
</html>
