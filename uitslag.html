<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jullie Resultaten | Flip 2 Trip</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #2D6A4F; --text: #1e293b; --light: #64748b; --bg: #ffffff; --card-bg: #fcfcfc; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; padding: 0; 
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

        /* Luchtige Header */
        header { text-align: center; padding: 60px 0 40px; }
        .logo { height: 45px; margin-bottom: 20px; filter: grayscale(1); opacity: 0.8; }
        h1 { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin: 0; }
        h1 span { color: var(--accent); }
        .subtitle { color: var(--light); font-size: 16px; margin-top: 10px; }

        /* Stats in een dunne lijn */
        .stats-row { 
            display: flex; justify-content: center; gap: 40px; 
            margin: 40px 0; padding: 20px 0; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9;
        }
        .stat-item { text-align: center; }
        .stat-item b { display: block; font-size: 20px; font-weight: 800; }
        .stat-item small { color: var(--light); text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }

        /* Grid Systeem voor Desktop */
        .results-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 30px; 
            margin-top: 30px;
        }

        /* Clean Cards */
        .card { 
            background: var(--card-bg); 
            border: 1px solid #f1f5f9; 
            border-radius: 20px; 
            overflow: hidden; 
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        
        .card-img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }
        
        .card-category { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
        .card-title { font-size: 18px; font-weight: 800; margin: 0 0 10px 0; line-height: 1.3; }
        .card-desc { font-size: 14px; color: var(--light); margin-bottom: 20px; flex-grow: 1; }
        
        .card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 15px; border-top: 1px solid #f8fafc; }
        .price { font-weight: 800; font-size: 16px; }
        .btn-link { 
            color: var(--accent); text-decoration: none; font-weight: 700; font-size: 14px; 
            padding: 8px 16px; border: 1px solid var(--accent); border-radius: 10px; transition: 0.2s;
        }
        .btn-link:hover { background: var(--accent); color: white; }

        /* Sectie titels */
        .section-header { margin: 80px 0 30px; text-align: left; }
        .section-header h2 { font-size: 24px; font-weight: 800; }

        /* WhatsApp Floating Button - Subtieler */
        .wa-float { 
            position: fixed; bottom: 30px; right: 30px; 
            background: #25D366; color: white; padding: 15px 25px; 
            border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 14px;
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.3); z-index: 1000;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .stats-row { gap: 20px; }
            h1 { font-size: 24px; }
            .results-grid { grid-template-columns: 1fr; }
            .wa-float { left: 20px; right: 20px; text-align: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="https://wijzijnvalkenburg.nl/wp-content/uploads/2026/03/Flip2Trip-logo-landscape.png" class="logo" alt="Flip 2 Trip">
        <h1 id="header-title">Resultaten <span>...</span></h1>
        <p class="subtitle">Op basis van de unieke vibe van jullie groep</p>
    </header>

    <div class="stats-row">
        <div class="stat-item"><b id="count-matches">0</b><small>Matches</small></div>
        <div class="stat-item"><b id="trip-id">...</b><small>Sessie ID</small></div>
        <div class="stat-item"><b>GYG</b><small>Boekingspartner</small></div>
    </div>

    <div class="section-header">
        <h2>🏆 Jullie Top 5</h2>
    </div>
    <div id="top-results" class="results-grid"></div>

    <div id="extra-section" style="display:none;">
        <div class="section-header">
            <h2>📊 Overige uitslagen</h2>
        </div>
        <div id="all-results-list" class="results-grid"></div>
    </div>

    <div style="text-align: center; margin: 40px 0;">
        <button onclick="toggleExtra()" id="btn-toggle" style="background:none; border:none; color:var(--light); cursor:pointer; font-weight:700; text-decoration:underline;">Bekijk alle resultaten</button>
    </div>

    <div class="section-header">
        <h2>📍 Combineer & ontdek</h2>
    </div>
    <div id="suggestions-list" class="results-grid"></div>

    <footer style="margin-top: 100px; text-align: center; color: var(--light); font-size: 12px; padding-bottom: 100px;">
        <p>© 2026 Flip 2 Trip. Alle boekingen verlopen via GetYourGuide met 24u annuleringsgarantie.</p>
    </footer>
</div>

<a href="#" id="wa-share" class="wa-float">Deel plan via WhatsApp</a>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { 
        apiKey: "AIzaSyAx_XDqOW9hth7dwSFBZYJnk_dTa2lnvQ0", 
        authDomain: "fliportrip-valkenburg.firebaseapp.com", 
        projectId: "fliportrip-valkenburg" 
    };
    const app = initializeApp(config);
    const db = getFirestore(app);

    window.toggleExtra = () => {
        const sec = document.getElementById('extra-section');
        const btn = document.getElementById('btn-toggle');
        const isHidden = sec.style.display === 'none';
        sec.style.display = isHidden ? 'block' : 'none';
        btn.innerText = isHidden ? 'Verberg extra resultaten' : 'Bekijk alle resultaten';
    };

    async function init() {
        const params = new URLSearchParams(window.location.search);
        const tripId = params.get('trip');
        if(!tripId) return;

        const roomSnap = await getDoc(doc(db, "rooms", tripId));
        if(!roomSnap.exists()) return;
        const room = roomSnap.data();
        const dest = room.destination || "Valkenburg";
        
        document.getElementById('header-title').querySelector('span').innerText = dest;
        document.getElementById('trip-id').innerText = tripId;
        document.getElementById('wa-share').href = `https://wa.me/?text=${encodeURIComponent('Ons groepsplan voor ' + dest + ' staat klaar: ' + window.location.href)}`;

        const actSnap = await getDocs(collection(db, "activities"));
        const activities = [];
        actSnap.forEach(d => activities.push({id: d.id, ...d.data()}));

        const votes = room.votes || {};
        const sortedIds = Object.keys(votes).sort((a,b) => votes[b] - votes[a]);
        document.getElementById('count-matches').innerText = sortedIds.length;

        const top5 = sortedIds.slice(0, 5);
        const rest = sortedIds.slice(5);

        const render = (ids, target) => {
            document.getElementById(target).innerHTML = ids.map(id => {
                const a = activities.find(x => x.id === id);
                if(!a) return '';
                return `
                    <div class="card">
                        <img src="${a.image}" class="card-img">
                        <div class="card-body">
                            <span class="card-category">${a.category}</span>
                            <h3 class="card-title">${a.title}</h3>
                            <p class="card-desc">${a.desc ? a.desc.substring(0, 100) + '...' : 'Een geweldige ervaring voor jullie groep.'}</p>
                            <div class="card-footer">
                                <span class="price">${a.price || '€ -'}</span>
                                <a href="${a.bookingUrl}" target="_blank" class="btn-link">Beschikbaarheid</a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        };

        render(top5, 'top-results');
        render(rest, 'all-results-list');

        // Suggesties
        const suggestions = activities
            .filter(a => a.city === dest && !sortedIds.includes(a.id))
            .sort(() => 0.5 - Math.random()).slice(0, 3);

        document.getElementById('suggestions-list').innerHTML = suggestions.map(a => `
            <div class="card">
                <img src="${a.image}" class="card-img" style="height:140px">
                <div class="card-body">
                    <span class="card-category">Tip van Flip</span>
                    <h3 class="card-title" style="font-size:16px;">${a.title}</h3>
                    <div class="card-footer">
                        <span class="price" style="font-size:14px;">${a.price || '€ -'}</span>
                        <a href="${a.bookingUrl}" target="_blank" class="btn-link" style="font-size:12px;">Bekijk</a>
                    </div>
                </div>
            </div>
        `).join('');
    }

    init();
</script>
</body>
</html>
