<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip 2 Trip | Ontdek je match</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* Gebruik de variabelen die we dynamisch gaan aanpassen */
        :root { 
            --accent: #2D6A4F; 
            --obsidian: #161B22; 
            --indigo: #1e293b; 
            --text-light: #64748b; 
        }

        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; color: var(--indigo); overflow-x: hidden; }
        
        /* Navigatie */
        nav { position: fixed; width: 100%; top: 0; height: 80px; z-index: 1000; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); display: flex; justify-content: space-between; align-items: center; padding: 0 5%; border-bottom: 1px solid rgba(0,0,0,0.05); box-sizing: border-box; }
        .logo img { height: 45px; }

        /* Hero Sectie */
        .hero { padding: 140px 5% 80px; display: grid; grid-template-columns: 1.2fr 1fr; gap: 50px; align-items: center; background: linear-gradient(135deg, #fff 0%, #f8fafc 100%); }
        .badge { background: var(--accent); color: white; padding: 6px 14px; border-radius: 8px; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 20px; display: inline-block; }
        h1 { font-size: clamp(32px, 5vw, 56px); font-weight: 800; margin: 0 0 20px; line-height: 1.1; letter-spacing: -2px; }
        .hero p { font-size: 18px; color: var(--text-light); line-height: 1.6; margin-bottom: 30px; }
        .btn-main { background: var(--obsidian); color: white; padding: 18px 32px; border-radius: 12px; text-decoration: none; font-weight: 700; display: inline-block; transition: 0.3s; }

        .hero-images { display: flex; gap: 15px; justify-content: flex-end; }
        .hero-card { width: 180px; height: 280px; border-radius: 15px; object-fit: cover; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: 3px solid white; }

        /* Trends Sectie */
        .section-trends { padding: 80px 5%; max-width: 1100px; margin: 0 auto; }
        .glass-box { background: #fff; border: 1px solid #f1f5f9; border-radius: 30px; padding: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.03); }
        .trend-card { display: flex; align-items: center; gap: 15px; background: #f8fafc; padding: 12px; border-radius: 20px; margin-bottom: 10px; }
        .trend-img { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; }
        .trend-info { flex: 1; }
        .trend-top { display: flex; justify-content: space-between; font-size: 13px; font-weight: 700; margin-bottom: 5px; }
        .progress-bar { height: 6px; background: #e2e8f0; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); transition: 1s ease-out; }

        @media (max-width: 900px) {
            .hero { grid-template-columns: 1fr; text-align: center; }
            .hero-images { display: none; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo"><img src="https://wijzijnvalkenburg.nl/wp-content/uploads/2026/03/Flip2Trip-logo-landscape.png" alt="Logo"></div>
    <a href="/app" class="btn-main" style="padding: 10px 20px; font-size: 14px;">Open App</a>
</nav>

<header class="hero">
    <div>
        <span class="badge" id="city-badge">Bestemming</span>
        <h1 id="city-title">Ontdek je volgende trip</h1>
        <p id="city-desc">Laden van de beste activiteiten voor jouw groep...</p>
        <a href="#" id="cta-link" class="btn-main">Start het swipen</a>
    </div>
    <div class="hero-images">
        <img id="img1" src="" class="hero-card" style="margin-top: 40px;">
        <img id="img2" src="" class="hero-card">
        <img id="img3" src="" class="hero-card" style="margin-top: -40px;">
    </div>
</header>

<section class="section-trends">
    <div class="glass-box">
        <div style="font-size: 11px; font-weight: 800; color: #ff4b4b; margin-bottom: 15px; display: flex; align-items: center; gap: 8px;">
            <div style="width: 8px; height: 8px; background: #ff4b4b; border-radius: 50%;"></div> LIVE TRENDS <span id="trend-city-name">...</span>
        </div>
        <h2 style="margin: 0 0 30px 0;">Wat anderen nu kiezen</h2>
        <div id="live-feed">Trends worden geladen...</div>
    </div>
</section>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { apiKey: "AIzaSyAx_XDqOW9hth7dwSFBZYJnk_dTa2lnvQ0", authDomain: "fliportrip-valkenburg.firebaseapp.com", projectId: "fliportrip-valkenburg" };
    const app = initializeApp(config);
    const db = getFirestore(app);

    // --- CONFIGURATIE PER STAD ---
    const cityConfig = {
        "Ardennen": {
            badge: "Regio Ardennen",
            title: "Avontuur wacht in de bossen.",
            desc: "Van wildwater kajakken tot verborgen grotten. Swipe met je vrienden en plan de ultieme outdoor trip.",
            accent: "#2D6A4F",
            images: [
                "https://wearelocal.events/wp-content/uploads/2025/01/Ardennen-basic-programma-teambuilding-.webp",
                "https://wearelocal.events/wp-content/uploads/2025/03/fakkelwandeling-durbuy-ardennen.webp",
                "https://wearelocal.events/wp-content/uploads/2025/01/grotten-ardennen.webp"
            ]
        },
        "Valkenburg": {
            badge: "Sfeervol Valkenburg",
            title: "Ontdek het zuiden op z'n best.",
            desc: "Mergelgrotten, gezellige terrasjes en de Cauberg. De perfecte mix voor een onvergetelijke groepsdag.",
            accent: "#D4A373",
            images: [
                "https://images.unsplash.com/photo-1593010156930-43574d7df67c?q=80&w=400",
                "https://images.unsplash.com/photo-1506929641214-5d5e53637604?q=80&w=400",
                "https://images.unsplash.com/photo-1600121848594-d8644e57abab?q=80&w=400"
            ]
        }
    };

    // 1. Bepaal welke stad we tonen
    const params = new URLSearchParams(window.location.search);
    const STAD = params.get('stad') || "Valkenburg"; // Default naar Valkenburg
    const data = cityConfig[STAD] || cityConfig["Valkenburg"];

    // 2. Pas de UI aan
    function setupUI() {
        document.getElementById('city-badge').innerText = data.badge;
        document.getElementById('city-title').innerText = data.title;
        document.getElementById('city-desc').innerText = data.desc;
        document.getElementById('trend-city-name').innerText = STAD.toUpperCase();
        document.documentElement.style.setProperty('--accent', data.accent);
        
        document.getElementById('img1').src = data.images[0];
        document.getElementById('img2').src = data.images[1];
        document.getElementById('img3').src = data.images[2];
        
        document.getElementById('cta-link').href = `/app?dest=${STAD}`;
    }

    // 3. Live Trends ophalen
    async function startTrends() {
        const actSnap = await getDocs(collection(db, "activities"));
        const lib = {};
        actSnap.forEach(d => { if(d.data().city === STAD) lib[d.id] = d.data(); });

        onSnapshot(collection(db, "rooms"), (snap) => {
            let votes = {}, total = 0;
            snap.forEach(doc => {
                const r = doc.data();
                if(r.votes && r.destination === STAD) {
                    Object.keys(r.votes).forEach(id => {
                        if(lib[id]) { votes[id] = (votes[id] || 0) + r.votes[id]; total += r.votes[id]; }
                    });
                }
            });
            
            const feed = document.getElementById('live-feed');
            if(total === 0) {
                feed.innerHTML = `<p style="font-size:14px; color:var(--text-light)">Nog geen live data voor ${STAD} beschikbaar.</p>`;
                return;
            }

            const top = Object.keys(votes).sort((a,b) => votes[b] - votes[a]).slice(0,3);
            feed.innerHTML = top.map(id => {
                const p = Math.round((votes[id]/total)*100);
                return `
                    <div class="trend-card">
                        <img src="${lib[id].image}" class="trend-img">
                        <div class="trend-info">
                            <div class="trend-top"><strong>${lib[id].title}</strong><span>${p}%</span></div>
                            <div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>
                        </div>
                    </div>`;
            }).join('');
        });
    }

    setupUI();
    startTrends();
</script>

</body>
</html>
