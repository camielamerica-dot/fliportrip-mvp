<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlipOrTrip | Business Suite v6.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    
    <style>
        :root { --mint: #00FFC2; --obsidian: #0B0E14; --card-bg: #161B22; --red: #FF4B4B; --text: #8899A6; }
        body { background: var(--obsidian); color: white; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; width: 100%; position: fixed; }
        .hidden { display: none !important; }
        
        /* UI Elements */
        .btn { background: var(--mint); color: var(--obsidian); padding: 16px; border-radius: 50px; font-weight: 800; border: none; cursor: pointer; width: 100%; max-width: 280px; margin-bottom: 10px; font-size: 13px; text-transform: uppercase; display: inline-block; text-align: center; }
        .input-box, .select-box { background: var(--card-bg); border: 1px solid rgba(0,255,194,0.3); padding: 14px; border-radius: 15px; color: white; margin-bottom: 12px; width: 100%; box-sizing: border-box; font-size: 16px; outline: none; text-align: center; }
        .label { font-size: 9px; color: var(--mint); text-transform: uppercase; font-weight: 800; margin-bottom: 4px; display: block; text-align: left; }

        /* Chips */
        .chip-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; justify-content: center; }
        .chip { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 20px; font-size: 11px; cursor: pointer; }
        .chip.active { background: var(--mint); color: var(--obsidian); font-weight: 800; }

        /* Card Overlay & Animation */
        .card { width: 85vw; max-width: 320px; height: 60vh; background: var(--card-bg); border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); position: absolute; overflow: hidden; transition: transform 0.2s; }
        .card-img { height: 50%; background-size: cover; background-position: center; pointer-events: none; }
        .overlay-label { position: absolute; top: 20px; padding: 10px 20px; border-radius: 10px; font-weight: 800; font-size: 20px; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 10; }
        .label-yes { right: 20px; color: var(--mint); border: 3px solid var(--mint); transform: rotate(15deg); }
        .label-no { left: 20px; color: var(--red); border: 3px solid var(--red); transform: rotate(-15deg); }

        /* Buttons onder kaart */
        .action-btns { position: absolute; bottom: 8vh; display: flex; gap: 30px; z-index: 100; }
        .circle-btn { width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: none; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(12px); display: none; align-items: center; justify-content: center; z-index: 99999; padding: 20px; }
        .modal-card { background: var(--card-bg); padding: 30px; border-radius: 30px; border: 1px solid var(--mint); width: 100%; max-width: 340px; text-align: center; }

        /* Timer/Header */
        #room-header { position: fixed; top: 0; width: 100%; height: 100px; background: var(--obsidian); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; border-bottom: 1px solid rgba(0,255,194,0.15); }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, increment, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const config = { apiKey: "AIzaSyAx_XDqOW9hth7dwSFBZYJnk_dTa2lnvQ0", authDomain: "fliportrip-valkenburg.firebaseapp.com", projectId: "fliportrip-valkenburg" };
        const app = initializeApp(config);
        const db = getFirestore(app);

        window.userInterests = [];
        window.currentRoom = null;

        window.showScreen = (id) => {
            document.querySelectorAll('.screen-content').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };

        window.createRoom = async () => {
            const code = Math.floor(1000 + Math.random() * 9000).toString();
            const deadline = Date.now() + (parseInt(document.getElementById('deadline-input').value) * 60000);
            
            await setDoc(doc(db, "rooms", code), { 
                hostName: document.getElementById('host-name').value,
                hostEmail: document.getElementById('host-email').value.toLowerCase(),
                destination: document.getElementById('host-dest').value,
                tripType: document.getElementById('trip-type').value,
                targetParticipants: parseInt(document.getElementById('target-p').value),
                deadline: deadline,
                groupInterests: window.userInterests,
                votes: {}, participants: []
            });

            window.currentRoom = code;
            document.getElementById('display-code').innerText = code;
            document.getElementById('wa-link').href = `https://wa.me/?text=Doe mee met onze trip naar ${document.getElementById('host-dest').value}! Code: ${code}`;
            showScreen('share-screen');
        };

        window.confirmJoin = async () => {
            const code = document.getElementById('join-code-input').value;
            const ds = await getDoc(doc(db, "rooms", code));
            if(ds.exists()) {
                window.currentRoom = code;
                window.roomData = ds.data();
                document.getElementById('join-modal').style.display = 'none';
                document.getElementById('profile-modal').style.display = 'flex';
            } else { alert("Code onjuist"); }
        };

        window.startSwiping = async () => {
            const age = document.getElementById('u-age').value;
            if(!age) return alert("Leeftijd is verplicht!");
            
            // Sla deelnemer op in de room
            await updateDoc(doc(db, "rooms", window.currentRoom), {
                participants: increment(1)
            });

            showScreen('swipe-screen');
            document.getElementById('room-header').classList.remove('hidden');
            document.getElementById('active-code').innerText = window.currentRoom;
            
            const q = query(collection(db, "activities"), where("city", "==", window.roomData.destination));
            const qs = await getDocs(q);
            window.acts = qs.docs.map(d => ({id: d.id, ...d.data()}));
            window.actIdx = 0; renderCard();
        };

        window.handleVote = async (choice) => {
            const card = document.querySelector('.card');
            if(!card) return;
            const a = window.acts[window.actIdx];
            if(choice === 'yes') {
                card.style.transform = 'translateX(1000px) rotate(30deg)';
                await updateDoc(doc(db, "rooms", window.currentRoom), { [`votes.${a.id}`]: increment(1) });
            } else {
                card.style.transform = 'translateX(-1000px) rotate(-30deg)';
            }
            setTimeout(() => { window.actIdx++; renderCard(); }, 250);
        };

        function renderCard() {
            const container = document.getElementById('card-container');
            container.innerHTML = "";
            if(window.actIdx >= window.acts.length) {
                container.innerHTML = "<div style='text-align:center; padding:20px;'><h2>Helemaal klaar! 🎉</h2><p>De host bekijkt de uitslag.</p></div>";
                document.getElementById('action-btns').style.display = 'none';
                return;
            }
            const a = window.acts[window.actIdx];
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="overlay-label label-yes">TRIP</div>
                <div class="overlay-label label-no">FLIP</div>
                <div class="card-img" style="background-image:url('${a.image}')"></div>
                <div style="padding:20px;">
                    <h3 style="margin:0">${a.title}</h3>
                    <p style="font-size:12px; opacity:0.7">${a.desc}</p>
                </div>`;
            container.appendChild(card);
            
            const h = new Hammer(card);
            const lYes = card.querySelector('.label-yes');
            const lNo = card.querySelector('.label-no');

            h.on('pan', e => {
                card.style.transform = `translateX(${e.deltaX}px) rotate(${e.deltaX/20}deg)`;
                if(e.deltaX > 40) { lYes.style.opacity = e.deltaX / 150; lNo.style.opacity = 0; }
                else if(e.deltaX < -40) { lNo.style.opacity = Math.abs(e.deltaX) / 150; lYes.style.opacity = 0; }
            });
            h.on('panend', e => {
                if(e.deltaX > 120) handleVote('yes');
                else if(e.deltaX < -120) handleVote('no');
                else { card.style.transform = ''; lYes.style.opacity = 0; lNo.style.opacity = 0; }
            });
        }
    </script>
</head>
<body>

    <div id="start-screen" class="screen-content" style="text-align:center;">
        <img src="https://wijzijnvalkenburg.nl/wp-content/uploads/2026/02/fliportrip_logo.png" width="140" style="margin-bottom:40px;">
        <button class="btn" onclick="showScreen('setup-screen')">Start Nieuwe Trip</button>
        <button class="btn" style="background:white" onclick="document.getElementById('join-modal').style.display='flex'">Voer Code In</button>
        <p onclick="document.getElementById('host-login-modal').style.display='flex'" style="font-size:11px; color:var(--text); margin-top:20px; cursor:pointer; text-decoration:underline;">Host Dashboard Login</p>
    </div>

    <div id="setup-screen" class="hidden screen-content" style="padding:20px; text-align:center; width:320px;">
        <span class="label">Trip Basics</span>
        <select id="host-dest" class="select-box"><option>Rome</option><option>Valkenburg</option></select>
        <select id="trip-type" class="select-box">
            <option value="Vrienden">Vriendenuitje</option>
            <option value="Vrijgezellen">Vrijgezellenfeest</option>
            <option value="Team">Teamuitje</option>
        </select>
        
        <span class="label">Groepsinteresses</span>
        <div class="chip-container">
            <div class="chip" onclick="toggleInterest(this, 'Cultuur')">🏛️ Cultuur</div>
            <div class="chip" onclick="toggleInterest(this, 'Food')">🍝 Food</div>
            <div class="chip" onclick="toggleInterest(this, 'Actief')">⚡ Actief</div>
        </div>

        <input type="text" id="host-name" class="input-box" placeholder="Jouw Naam">
        <input type="email" id="host-email" class="input-box" placeholder="E-mail voor uitslag">
        
        <div style="display:flex; gap:10px;">
            <div style="flex:1"><span class="label">Personen</span><input type="number" id="target-p" class="input-box" value="4"></div>
            <div style="flex:1"><span class="label">Tijd (min)</span><input type="number" id="deadline-input" class="input-box" value="60"></div>
        </div>

        <button class="btn" onclick="createRoom()">Trip Activeren</button>
        <p onclick="showScreen('start-screen')" style="font-size:12px; cursor:pointer;">Annuleren</p>
    </div>

    <div id="share-screen" class="hidden screen-content" style="text-align:center; padding:20px;">
        <span class="label">Deel deze code:</span>
        <h1 id="display-code" style="color:var(--mint); font-size:65px; margin: 10px 0;"></h1>
        <a id="wa-link" class="btn" style="background:#25D366; color:white;">Deel via WhatsApp</a>
        <button class="btn" onclick="startSwiping()">Zelf Beginnen</button>
    </div>

    <div id="swipe-screen" class="hidden screen-content">
        <div id="room-header">
            <div style="font-size:8px; color:var(--mint); letter-spacing:2px;">STOP DECIDING. START DOING.</div>
            <div style="font-weight:800; font-size:18px; margin-top:5px;">ROOM: <span id="active-code" style="color:var(--mint)"></span></div>
        </div>
        <div id="card-container" style="position:relative; width:100%; height:100vh; display:flex; align-items:center; justify-content:center;"></div>
        <div class="action-btns" id="action-btns">
            <button class="circle-btn" style="background:white; color:var(--red);" onclick="handleVote('no')">✕</button>
            <button class="circle-btn" style="background:var(--mint); color:var(--obsidian);" onclick="handleVote('yes')">❤</button>
        </div>
    </div>

    <div id="join-modal" class="modal-overlay">
        <div class="modal-card">
            <h3>Code Invoeren</h3>
            <input type="number" id="join-code-input" class="input-box" placeholder="Bijv. 1234">
            <button class="btn" onclick="confirmJoin()">Deelnemen</button>
            <p onclick="document.getElementById('join-modal').style.display='none'" style="cursor:pointer; font-size:12px;">Terug</p>
        </div>
    </div>

    <div id="host-login-modal" class="modal-overlay">
        <div class="modal-card">
            <h3 style="color:var(--mint)">Host Login</h3>
            <input type="number" id="h-code" class="input-box" placeholder="Room Code">
            <input type="email" id="h-email" class="input-box" placeholder="Je E-mail">
            <button class="btn">Bekijk Resultaten</button>
            <p onclick="document.getElementById('host-login-modal').style.display='none'" style="cursor:pointer; font-size:12px;">Sluiten</p>
        </div>
    </div>

    <div id="profile-modal" class="modal-overlay">
        <div class="modal-card">
            <h3 style="color:var(--mint)">Wie ben je?</h3>
            <span class="label">Geslacht</span>
            <select id="u-gender" class="select-box"><option>Man</option><option>Vrouw</option><option>Anders</option></select>
            <span class="label">Leeftijd</span>
            <input type="number" id="u-age" class="input-box" placeholder="Bijv. 24">
            <button class="btn" onclick="startSwiping()">Start Swipen</button>
        </div>
    </div>

</body>
</html>
