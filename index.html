<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlipOrTrip | Business Suite v6.6</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    
    <style>
        :root { --mint: #00FFC2; --obsidian: #0B0E14; --card-bg: #161B22; --red: #FF4B4B; --text: #8899A6; }
        body { background: var(--obsidian); color: white; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        
        /* Layout */
        .screen-content { width: 100%; max-width: 340px; display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
        
        /* UI Elements */
        .btn { background: var(--mint); color: var(--obsidian); padding: 16px; border-radius: 50px; font-weight: 800; border: none; cursor: pointer; width: 100%; margin-bottom: 12px; font-size: 13px; text-transform: uppercase; text-align: center; text-decoration: none; }
        .input-box, .select-box { background: var(--card-bg); border: 1px solid rgba(0,255,194,0.3); padding: 14px; border-radius: 15px; color: white; margin-bottom: 12px; width: 100%; box-sizing: border-box; font-size: 16px; outline: none; text-align: center; }
        .label { font-size: 10px; color: var(--mint); text-transform: uppercase; font-weight: 800; margin-bottom: 6px; width: 100%; text-align: left; }

        /* Chips Fix */
        .chip-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; width: 100%; justify-content: center; }
        .chip { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 10px 18px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: 0.2s; }
        .chip.active { background: var(--mint) !important; color: var(--obsidian) !important; font-weight: 800; border-color: var(--mint); }

        /* Card System */
        #card-container { position: relative; width: 100%; height: 65vh; display: flex; align-items: center; justify-content: center; margin-top: 100px; }
        .card { width: 300px; height: 450px; background: var(--card-bg); border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); position: absolute; overflow: hidden; transition: transform 0.2s; }
        .card-img { height: 55%; background-size: cover; background-position: center; pointer-events: none; }
        
        .overlay-label { position: absolute; top: 30px; padding: 10px 20px; border-radius: 10px; font-weight: 800; font-size: 24px; opacity: 0; z-index: 20; pointer-events: none; border: 4px solid; }
        .label-yes { right: 20px; color: var(--mint); border-color: var(--mint); transform: rotate(15deg); }
        .label-no { left: 20px; color: var(--red); border-color: var(--red); transform: rotate(-15deg); }

        .action-btns { position: fixed; bottom: 40px; display: flex; gap: 40px; z-index: 100; }
        .circle-btn { width: 70px; height: 70px; border-radius: 50%; border: none; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); display: none; align-items: center; justify-content: center; z-index: 99999; padding: 20px; }
        .modal-card { background: var(--card-bg); padding: 30px; border-radius: 30px; border: 1px solid var(--mint); width: 100%; max-width: 320px; text-align: center; }
        
        #room-header { position: fixed; top: 0; width: 100%; height: 90px; background: var(--obsidian); border-bottom: 1px solid rgba(0,255,194,0.2); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, increment, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const config = { apiKey: "AIzaSyAx_XDqOW9hth7dwSFBZYJnk_dTa2lnvQ0", authDomain: "fliportrip-valkenburg.firebaseapp.com", projectId: "fliportrip-valkenburg" };
        const app = initializeApp(config);
        const db = getFirestore(app);

        window.userInterests = [];
        window.currentRoom = null;

        window.toggleInterest = (el, interest) => {
            el.classList.toggle('active');
            const idx = window.userInterests.indexOf(interest);
            if(idx > -1) window.userInterests.splice(idx, 1);
            else window.userInterests.push(interest);
        };

        window.showScreen = (id) => {
            document.querySelectorAll('.screen-content').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };

        window.createRoom = async () => {
            const code = Math.floor(1000 + Math.random() * 9000).toString();
            await setDoc(doc(db, "rooms", code), { 
                hostName: document.getElementById('host-name').value,
                destination: document.getElementById('host-dest').value,
                deadline: Date.now() + (parseInt(document.getElementById('deadline-input').value) * 60000),
                groupInterests: window.userInterests,
                votes: {}
            });
            window.currentRoom = code;
            document.getElementById('display-code').innerText = code;
            showScreen('share-screen');
        };

        window.confirmJoin = async () => {
            const code = document.getElementById('join-code-input').value;
            const ds = await getDoc(doc(db, "rooms", code));
            if(ds.exists()) {
                window.currentRoom = code;
                window.roomData = ds.data();
                document.getElementById('join-modal').style.display = 'none';
                document.getElementById('profile-modal').style.display = 'flex';
            } else { alert("Code niet gevonden"); }
        };

        window.startSwiping = async () => {
            const age = document.getElementById('u-age').value;
            if(!age || age < 1) return alert("Vul a.u.b. je leeftijd in.");
            
            document.getElementById('profile-modal').style.display = 'none';
            showScreen('swipe-screen');
            document.getElementById('room-header').classList.remove('hidden');
            document.getElementById('active-code').innerText = window.currentRoom;
            
            const q = query(collection(db, "activities"), where("city", "==", window.roomData.destination));
            const qs = await getDocs(q);
            window.acts = qs.docs.map(d => ({id: d.id, ...d.data()}));
            window.actIdx = 0; renderCard();
        };

        window.handleVote = async (choice) => {
            const card = document.querySelector('.card');
            if(!card) return;
            const a = window.acts[window.actIdx];
            if(choice === 'yes') {
                card.style.transform = 'translateX(1000px) rotate(30deg)';
                await updateDoc(doc(db, "rooms", window.currentRoom), { [`votes.${a.id}`]: increment(1) });
            } else {
                card.style.transform = 'translateX(-1000px) rotate(-30deg)';
            }
            setTimeout(() => { window.actIdx++; renderCard(); }, 300);
        };

        function renderCard() {
            const container = document.getElementById('card-container');
            container.innerHTML = "";
            if(window.actIdx >= window.acts.length) {
                container.innerHTML = "<h2>Klaar! 🎉</h2>";
                document.getElementById('action-btns').classList.add('hidden');
                return;
            }
            const a = window.acts[window.actIdx];
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="overlay-label label-yes">TRIP</div>
                <div class="overlay-label label-no">FLIP</div>
                <div class="card-img" style="background-image:url('${a.image}')"></div>
                <div style="padding:20px;"><h3>${a.title}</h3><p style="font-size:12px;opacity:0.7">${a.desc}</p></div>`;
            container.appendChild(card);
            
            const h = new Hammer(card);
            const lYes = card.querySelector('.label-yes');
            const lNo = card.querySelector('.label-no');

            h.on('pan', e => {
                card.style.transform = `translateX(${e.deltaX}px) rotate(${e.deltaX/20}deg)`;
                if(e.deltaX > 40) { lYes.style.opacity = e.deltaX/150; lNo.style.opacity = 0; }
                else if(e.deltaX < -40) { lNo.style.opacity = Math.abs(e.deltaX)/150; lYes.style.opacity = 0; }
            });
            h.on('panend', e => {
                if(e.deltaX > 120) handleVote('yes');
                else if(e.deltaX < -120) handleVote('no');
                else { card.style.transform = ''; lYes.style.opacity = 0; lNo.style.opacity = 0; }
            });
        }
    </script>
</head>
<body>

    <div id="start-screen" class="screen-content">
        <img src="https://wijzijnvalkenburg.nl/wp-content/uploads/2026/02/fliportrip_logo.png" width="160" style="margin-bottom:40px;">
        <button class="btn" onclick="showScreen('setup-screen')">Trip Maken</button>
        <button class="btn" style="background:white; color:black;" onclick="document.getElementById('join-modal').style.display='flex'">Code Invoeren</button>
        <p onclick="document.getElementById('host-login-modal').style.display='flex'" style="font-size:11px; color:var(--text); margin-top:20px; text-decoration:underline; cursor:pointer;">Host Dashboard</p>
    </div>

    <div id="setup-screen" class="hidden screen-content">
        <span class="label">Bestemming</span>
        <select id="host-dest" class="select-box"><option>Rome</option><option>Valkenburg</option></select>
        
        <span class="label">Groepsinteresses</span>
        <div class="chip-container">
            <div class="chip" onclick="toggleInterest(this, 'Cultuur')">🏛️ Cultuur</div>
            <div class="chip" onclick="toggleInterest(this, 'Food')">🍝 Food</div>
            <div class="chip" onclick="toggleInterest(this, 'Actief')">⚡ Actief</div>
        </div>

        <input type="text" id="host-name" class="input-box" placeholder="Je Naam">
        <input type="email" id="host-email" class="input-box" placeholder="Je E-mail">
        
        <div style="display:flex; gap:10px; width:100%;">
            <input type="number" id="target-p" class="input-box" placeholder="Aantal pers." value="4">
            <input type="number" id="deadline-input" class="input-box" placeholder="Minuten" value="60">
        </div>

        <button class="btn" onclick="createRoom()">Start Trip</button>
        <p onclick="showScreen('start-screen')" style="cursor:pointer; font-size:12px;">Terug</p>
    </div>

    <div id="share-screen" class="hidden screen-content">
        <p>Deel de code met je groep:</p>
        <h1 id="display-code" style="color:var(--mint); font-size:70px; margin:20px 0;"></h1>
        <button class="btn" onclick="document.getElementById('profile-modal').style.display='flex'">Zelf beginnen</button>
    </div>

    <div id="swipe-screen" class="hidden screen-content">
        <div id="room-header">
            <div style="font-size:8px; color:var(--mint); letter-spacing:2px;">STOP DECIDING. START DOING.</div>
            <div style="font-weight:800; font-size:18px; margin-top:5px;">ROOM: <span id="active-code" style="color:var(--mint)"></span></div>
        </div>
        <div id="card-container"></div>
        <div class="action-btns" id="action-btns">
            <button class="circle-btn" style="background:white; color:var(--red);" onclick="handleVote('no')">✕</button>
            <button class="circle-btn" style="background:var(--mint); color:var(--obsidian);" onclick="handleVote('yes')">❤</button>
        </div>
    </div>

    <div id="join-modal" class="modal-overlay">
        <div class="modal-card">
            <h3>Code?</h3>
            <input type="number" id="join-code-input" class="input-box">
            <button class="btn" onclick="confirmJoin()">Join</button>
            <p onclick="document.getElementById('join-modal').style.display='none'">Sluiten</p>
        </div>
    </div>

    <div id="profile-modal" class="modal-overlay">
        <div class="modal-card">
            <h3 style="color:var(--mint)">Wie ben je?</h3>
            <span class="label">Geslacht</span>
            <select id="u-gender" class="select-box"><option>Man</option><option>Vrouw</option></select>
            <span class="label">Leeftijd</span>
            <input type="number" id="u-age" class="input-box" placeholder="Bijv. 25">
            <button class="btn" onclick="startSwiping()">Start Swipen</button>
        </div>
    </div>

    <div id="host-login-modal" class="modal-overlay">
        <div class="modal-card">
            <h3>Host Login</h3>
            <input type="number" class="input-box" placeholder="Room Code">
            <input type="email" class="input-box" placeholder="E-mail">
            <button class="btn">Inloggen</button>
            <p onclick="document.getElementById('host-login-modal').style.display='none'">Sluiten</p>
        </div>
    </div>

</body>
</html>
