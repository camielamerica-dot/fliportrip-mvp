<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlipOrTrip | Smart Business Suite v6.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBGms1-wiv_5tq1ehzhhJOjM905WnFMexo&libraries=places"></script>
    
    <style>
        :root { --mint: #00FFC2; --obsidian: #0B0E14; --card-bg: #161B22; }
        body { background: var(--obsidian); color: white; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; position: fixed; width: 100%; }
        .hidden { display: none !important; }
        .btn { background: var(--mint); color: var(--obsidian); padding: 16px; border-radius: 50px; font-weight: 800; border: none; cursor: pointer; width: 100%; max-width: 280px; margin-bottom: 10px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .input-box, .select-box { background: var(--card-bg); border: 1px solid rgba(0,255,194,0.3); padding: 14px; border-radius: 15px; color: white; text-align: center; margin-bottom: 12px; width: 100%; box-sizing: border-box; font-size: 16px; outline: none; }
        .label { font-size: 9px; color: var(--mint); text-transform: uppercase; font-weight: 800; margin-bottom: 4px; display: block; text-align: left; }
        
        /* Interest Chips */
        .chip-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; justify-content: center; }
        .chip { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 20px; font-size: 11px; cursor: pointer; }
        .chip.active { background: var(--mint); color: var(--obsidian); font-weight: 800; }

        /* Card System */
        #room-header { position: fixed; top: 0; width: 100%; height: 85px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--obsidian); z-index: 1000; border-bottom: 1px solid rgba(0,255,194,0.2); }
        #swipe-screen { position: relative; width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; touch-action: none; }
        .card { width: 85vw; max-width: 320px; height: 60vh; max-height: 460px; background: var(--card-bg); border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); position: absolute; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .card-img { height: 50%; background-size: cover; background-position: center; pointer-events: none; }
        .card-info { padding: 20px; text-align: left; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 99999; padding: 20px; }
        .modal-card { background: var(--card-bg); padding: 25px; border-radius: 25px; border: 1px solid var(--mint); width: 100%; max-width: 320px; text-align: center; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, increment, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const config = { apiKey: "AIzaSyAx_XDqOW9hth7dwSFBZYJnk_dTa2lnvQ0", authDomain: "fliportrip-valkenburg.firebaseapp.com", projectId: "fliportrip-valkenburg" };
        const app = initializeApp(config);
        const db = getFirestore(app);

        window.userInterests = [];
        window.currentRoom = null;
        window.roomDestination = "";

        // Laden van bestemmingen uit Admin Settings (zoals in v5.2)
        async function loadDests() {
            const q = query(collection(db, "settings"), where("type", "==", "destinations"));
            const s = await getDocs(q);
            const sel = document.getElementById('host-dest');
            sel.innerHTML = "";
            s.forEach(d => sel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`);
        }
        loadDests();

        window.toggleInterest = (el, interest) => {
            el.classList.toggle('active');
            const idx = window.userInterests.indexOf(interest);
            if(idx > -1) window.userInterests.splice(idx, 1);
            else window.userInterests.push(interest);
        };

        window.createRoom = async () => {
            const name = document.getElementById('host-name').value;
            const email = document.getElementById('host-email').value;
            const dest = document.getElementById('host-dest').value;
            const target = parseInt(document.getElementById('target-p').value);
            const minutes = parseInt(document.getElementById('deadline-input').value);
            const code = Math.floor(1000 + Math.random() * 9000).toString();
            
            if(!name || !email) return alert("Naam en E-mail zijn verplicht!");

            await setDoc(doc(db, "rooms", code), { 
                hostName: name, 
                hostEmail: email.toLowerCase(),
                destination: dest, 
                targetParticipants: target,
                deadline: Date.now() + (minutes * 60000),
                groupInterests: window.userInterests,
                votes: {}, 
                finishedCount: 0,
                mailSent: false
            });

            window.currentRoom = code; window.roomDestination = dest;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('share-screen').classList.remove('hidden');
            document.getElementById('display-code').innerText = code;
        };

        window.confirmJoin = async () => {
            const code = document.getElementById('join-code-input').value.trim();
            const ds = await getDoc(doc(db, "rooms", code));
            if(ds.exists()) {
                window.currentRoom = code; 
                window.roomDestination = ds.data().destination;
                document.getElementById('join-modal').style.display = 'none';
                document.getElementById('profile-modal').style.display = 'flex';
            } else { alert("Code niet gevonden!"); }
        };

        window.startSwiping = async () => {
            document.querySelectorAll('.screen-content').forEach(s => s.classList.add('hidden'));
            document.getElementById('room-header').classList.remove('hidden');
            document.getElementById('swipe-screen').classList.remove('hidden');
            document.getElementById('active-code-display').innerText = window.currentRoom;
            
            const q = query(collection(db, "activities"), where("city", "==", window.roomDestination));
            const qs = await getDocs(q);
            
            // SMART SORT (v6): Matchende interesses komen bovenaan
            window.acts = qs.docs.map(d => {
                const data = d.data();
                let bonus = window.userInterests.includes(data.category) ? 10 : 0;
                return { id: d.id, ...data, sortScore: bonus };
            }).sort((a,b) => b.sortScore - a.sortScore);

            window.actIdx = 0; renderCard();
        };

        function renderCard() {
            const container = document.getElementById('swipe-screen');
            container.innerHTML = "";
            if(window.actIdx >= window.acts.length) {
                finishUser();
                return;
            }
            const a = window.acts[window.actIdx];
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-img" style="background-image:url('${a.image}')"></div>
                <div class="card-info">
                    <h2 style="margin:0;font-size:18px;">${a.title}</h2>
                    <p style="font-size:10px; color:var(--mint); text-transform:uppercase; font-weight:800; margin:5px 0;">${a.category}</p>
                    <p style="font-size:12px;opacity:0.7; height:60px; overflow:hidden;">${a.desc || ''}</p>
                    <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(a.location)}" target="_blank" style="color:var(--mint); text-decoration:none; font-size:11px; font-weight:800;">📍 BEKIJK LOCATIE</a>
                </div>`;
            container.appendChild(card);
            
            const h = new Hammer(card);
            h.on('pan', e => { card.style.transform = `translateX(${e.deltaX}px) rotate(${e.deltaX/20}deg)`; });
            h.on('panend', async e => {
                if(Math.abs(e.deltaX) > 100) {
                    if(e.deltaX > 0) {
                        const up = {}; up[`votes.${a.id}`] = increment(1);
                        await updateDoc(doc(db, "rooms", window.currentRoom), up);
                    }
                    window.actIdx++; renderCard();
                } else { card.style.transform = ''; }
            });
        }

        async function finishUser() {
            await updateDoc(doc(db, "rooms", window.currentRoom), { finishedCount: increment(1) });
            document.getElementById('swipe-screen').innerHTML = `
                <div style='text-align:center; padding:20px;'>
                    <h2 style='color:var(--mint)'>Lekker bezig! 🔥</h2>
                    <p>Je keuzes zijn opgeslagen. Zodra iedereen klaar is krijgt de host de uitslag!</p>
                </div>`;
        }
    </script>
</head>
<body>
    <div id="start-screen" class="screen-content" style="text-align:center;">
        <img src="https://wijzijnvalkenburg.nl/wp-content/uploads/2026/02/fliportrip_logo.png" width="140" style="margin-bottom:30px;">
        <button class="btn" onclick="document.getElementById('start-screen').classList.add('hidden'); document.getElementById('setup-screen').classList.remove('hidden');">Trip Maken</button>
        <button class="btn" style="background:white; color:black;" onclick="document.getElementById('join-modal').style.display='flex'">Code Invoeren</button>
    </div>

    <div id="setup-screen" class="hidden screen-content" style="padding:20px; text-align:center; width:100%; max-width:320px;">
        <span class="label">Kies Bestemming</span>
        <select id="host-dest" class="select-box"></select>
        
        <span class="label">Wat zijn de interesses?</span>
        <div class="chip-container">
            <div class="chip" onclick="toggleInterest(this, 'Cultuur')">🏛️ Cultuur</div>
            <div class="chip" onclick="toggleInterest(this, 'Food')">🍝 Food</div>
            <div class="chip" onclick="toggleInterest(this, 'Actief')">⚡ Actief</div>
            <div class="chip" onclick="toggleInterest(this, 'Nightlife')">🍸 Nightlife</div>
        </div>

        <input type="text" id="host-name" class="input-box" placeholder="Je Naam">
        <input type="email" id="host-email" class="input-box" placeholder="Je E-mail (voor uitslag)">
        
        <div style="display:flex; gap:10px;">
            <div style="flex:1">
                <span class="label">Personen</span>
                <input type="number" id="target-p" class="input-box" value="4">
            </div>
            <div style="flex:1">
                <span class="label">Tijd (min)</span>
                <input type="number" id="deadline-input" class="input-box" value="60">
            </div>
        </div>
        
        <button class="btn" onclick="createRoom()">Start Trip</button>
    </div>

    <div id="swipe-screen" class="hidden screen-content"></div>

    <div id="join-modal" class="modal-overlay">
        <div class="modal-card">
            <h3>Voer de code in</h3>
            <input type="number" id="join-code-input" class="input-box" placeholder="4-cijferige code">
            <button class="btn" onclick="confirmJoin()">Deelnemen</button>
            <p onclick="document.getElementById('join-modal').style.display='none'" style="font-size:12px; cursor:pointer; margin-top:10px;">Annuleren</p>
        </div>
    </div>

    <div id="profile-modal" class="modal-overlay">
        <div class="modal-card">
            <h3 style="color:var(--mint)">Welkom bij de trip!</h3>
            <span class="label">Wat vind jij belangrijk?</span>
            <div class="chip-container">
                <div class="chip" onclick="toggleInterest(this, 'Cultuur')">🏛️ Cultuur</div>
                <div class="chip" onclick="toggleInterest(this, 'Food')">🍝 Food</div>
                <div class="chip" onclick="toggleInterest(this, 'Actief')">⚡ Actief</div>
            </div>
            <button class="btn" onclick="window.startSwiping()">Start Flippen</button>
        </div>
    </div>

    <div id="share-screen" class="hidden screen-content" style="text-align:center;">
        <p>Deel deze code met je vrienden:</p>
        <h1 id="display-code" style="color:var(--mint); font-size:60px; margin: 10px 0;"></h1>
        <button class="btn" onclick="startSwiping()">Zelf beginnen</button>
    </div>

    <div id="room-header" class="hidden">
        <div style="font-size: 8px; font-weight: 800; color: var(--mint); letter-spacing: 2px;">STOP DECIDING. START DOING.</div>
        <div style="font-size: 11px; font-weight: 800; color: white; margin-top:5px;">CODE: <span id="active-code-display" style="color:var(--mint)"></span></div>
    </div>
</body>
</html>
