<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlipOrTrip | Smart Business Suite v6.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBGms1-wiv_5tq1ehzhhJOjM905WnFMexo&libraries=places"></script>
    
    <style>
        :root { --mint: #00FFC2; --obsidian: #0B0E14; --card-bg: #161B22; --red: #FF4B4B; }
        body { background: var(--obsidian); color: white; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; position: fixed; width: 100%; }
        .hidden { display: none !important; }
        .btn { background: var(--mint); color: var(--obsidian); padding: 16px; border-radius: 50px; font-weight: 800; border: none; cursor: pointer; width: 100%; max-width: 280px; margin-bottom: 10px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; display: inline-block; text-decoration: none; }
        .input-box, .select-box { background: var(--card-bg); border: 1px solid rgba(0,255,194,0.3); padding: 14px; border-radius: 15px; color: white; text-align: center; margin-bottom: 12px; width: 100%; box-sizing: border-box; font-size: 16px; outline: none; }
        .label { font-size: 9px; color: var(--mint); text-transform: uppercase; font-weight: 800; margin-bottom: 4px; display: block; text-align: left; }
        
        /* Room Header & Timer */
        #room-header { position: fixed; top: 0; width: 100%; height: 90px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--obsidian); z-index: 1000; border-bottom: 1px solid rgba(0,255,194,0.2); }
        #timer-display { font-size: 14px; color: var(--red); font-weight: 800; margin-top: 5px; }

        /* Card System */
        .card { width: 85vw; max-width: 320px; height: 60vh; max-height: 460px; background: var(--card-bg); border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); position: absolute; overflow: hidden; }
        .card-img { height: 50%; background-size: cover; background-position: center; pointer-events: none; }
        
        /* Swipe Indicators */
        .swipe-hint { position: absolute; top: 50%; width: 100%; display: flex; justify-content: space-between; padding: 0 10px; pointer-events: none; z-index: 100; opacity: 0.5; }
        .hint-tag { padding: 10px; border-radius: 10px; font-weight: 800; font-size: 10px; border: 2px solid; }
        .hint-no { border-color: var(--red); color: var(--red); transform: rotate(-15deg); }
        .hint-yes { border-color: var(--mint); color: var(--mint); transform: rotate(15deg); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 99999; padding: 20px; }
        .modal-card { background: var(--card-bg); padding: 25px; border-radius: 25px; border: 1px solid var(--mint); width: 100%; max-width: 340px; text-align: center; }
        
        .chip-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; justify-content: center; }
        .chip { background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 20px; font-size: 11px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .chip.active { background: var(--mint); color: var(--obsidian); font-weight: 800; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, increment, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const config = { apiKey: "AIzaSyAx_XDqOW9hth7dwSFBZYJnk_dTa2lnvQ0", authDomain: "fliportrip-valkenburg.firebaseapp.com", projectId: "fliportrip-valkenburg" };
        const app = initializeApp(config);
        const db = getFirestore(app);

        window.userInterests = [];
        window.currentRoom = null;
        window.deadlineTimer = null;

        // Load Dest & Categories from Settings
        async function loadInit() {
            const s = await getDocs(collection(db, "settings"));
            const dests = s.docs.filter(d => d.data().type === 'destinations');
            const sel = document.getElementById('host-dest');
            dests.forEach(d => sel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`);
        }
        loadInit();

        window.toggleInterest = (el, interest) => {
            el.classList.toggle('active');
            const idx = window.userInterests.indexOf(interest);
            if(idx > -1) window.userInterests.splice(idx, 1);
            else window.userInterests.push(interest);
        };

        window.createRoom = async () => {
            const name = document.getElementById('host-name').value;
            const email = document.getElementById('host-email').value;
            const code = Math.floor(1000 + Math.random() * 9000).toString();
            const deadline = Date.now() + (parseInt(document.getElementById('deadline-input').value) * 60000);

            await setDoc(doc(db, "rooms", code), { 
                hostName: name, hostEmail: email,
                destination: document.getElementById('host-dest').value,
                tripType: document.getElementById('trip-type').value,
                targetParticipants: parseInt(document.getElementById('target-p').value),
                deadline: deadline,
                groupInterests: window.userInterests,
                votes: {}, finishedCount: 0
            });

            window.currentRoom = code;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('share-screen').classList.remove('hidden');
            document.getElementById('display-code').innerText = code;
            
            // Setup WhatsApp Link
            const waMsg = encodeURIComponent(`Doe mee met onze trip! Code: ${code}. Vul je voorkeuren in op: ${window.location.href}`);
            document.getElementById('wa-btn').href = `https://wa.me/?text=${waMsg}`;
        };

        window.confirmJoin = async () => {
            const code = document.getElementById('join-code-input').value.trim();
            const ds = await getDoc(doc(db, "rooms", code));
            if(ds.exists()) {
                window.currentRoom = code;
                window.roomDeadline = ds.data().deadline;
                document.getElementById('join-modal').style.display = 'none';
                document.getElementById('profile-modal').style.display = 'flex';
            } else { alert("Code niet gevonden"); }
        };

        window.startSwiping = async () => {
            document.querySelectorAll('.screen-content').forEach(s => s.classList.add('hidden'));
            document.getElementById('room-header').classList.remove('hidden');
            document.getElementById('swipe-screen').classList.remove('hidden');
            document.getElementById('active-code-display').innerText = window.currentRoom;
            
            startTimer(window.roomDeadline || Date.now() + 3600000);

            const rSnap = await getDoc(doc(db, "rooms", window.currentRoom));
            const q = query(collection(db, "activities"), where("city", "==", rSnap.data().destination));
            const qs = await getDocs(q);
            window.acts = qs.docs.map(d => ({ id: d.id, ...d.data() }));
            window.actIdx = 0; renderCard();
        };

        function startTimer(endTime) {
            window.deadlineTimer = setInterval(() => {
                const diff = endTime - Date.now();
                if(diff <= 0) {
                    clearInterval(window.deadlineTimer);
                    document.getElementById('timer-display').innerText = "TIJD IS OM!";
                } else {
                    const m = Math.floor(diff / 60000);
                    const s = Math.floor((diff % 60000) / 1000);
                    document.getElementById('timer-display').innerText = `TIJD OVER: ${m}:${s < 10 ? '0' : ''}${s}`;
                }
            }, 1000);
        }

        function renderCard() {
            const container = document.getElementById('swipe-screen');
            container.innerHTML = `<div class="swipe-hint"><div class="hint-tag hint-no">FLIP (NEE)</div><div class="hint-tag hint-yes">TRIP (JA)</div></div>`;
            if(window.actIdx >= window.acts.length) {
                container.innerHTML = "<h2>Klaar! Wacht op de uitslag.</h2>";
                return;
            }
            const a = window.acts[window.actIdx];
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-img" style="background-image:url('${a.image}')"></div>
                <div style="padding:20px;">
                    <h3 style="margin:0">${a.title}</h3>
                    <p style="font-size:12px; opacity:0.6">${a.desc}</p>
                </div>`;
            container.appendChild(card);
            
            const h = new Hammer(card);
            h.on('pan', e => { card.style.transform = `translateX(${e.deltaX}px) rotate(${e.deltaX/20}deg)`; });
            h.on('panend', async e => {
                if(Math.abs(e.deltaX) > 100) {
                    if(e.deltaX > 0) await updateDoc(doc(db, "rooms", window.currentRoom), { [`votes.${a.id}`]: increment(1) });
                    window.actIdx++; renderCard();
                } else { card.style.transform = ''; }
            });
        }
    </script>
</head>
<body>
    <div id="start-screen" class="screen-content" style="text-align:center;">
        <img src="https://wijzijnvalkenburg.nl/wp-content/uploads/2026/02/fliportrip_logo.png" width="140" style="margin-bottom:30px;">
        <button class="btn" onclick="document.getElementById('start-screen').classList.add('hidden'); document.getElementById('setup-screen').classList.remove('hidden');">Trip Maken</button>
        <button class="btn" style="background:white; color:black;" onclick="document.getElementById('join-modal').style.display='flex'">Code Invoeren</button>
    </div>

    <div id="setup-screen" class="hidden screen-content" style="padding:20px; text-align:center; width:320px;">
        <span class="label">Trip Details</span>
        <select id="host-dest" class="select-box"></select>
        <select id="trip-type" class="select-box">
            <option value="Vrienden">Vriendenuitje</option>
            <option value="Familie">Familiedag</option>
            <option value="Team">Teamuitje</option>
            <option value="Vrijgezellen">Vrijgezellenfeest</option>
        </select>
        
        <input type="text" id="host-name" class="input-box" placeholder="Je Naam">
        <input type="email" id="host-email" class="input-box" placeholder="Je E-mail">
        
        <div style="display:flex; gap:10px;">
            <input type="number" id="target-p" class="input-box" value="4" placeholder="Pers.">
            <input type="number" id="deadline-input" class="input-box" value="60" placeholder="Min.">
        </div>
        
        <button class="btn" onclick="createRoom()">Start Trip</button>
    </div>

    <div id="share-screen" class="hidden screen-content" style="text-align:center;">
        <p>Deel de code:</p>
        <h1 id="display-code" style="color:var(--mint); font-size:60px;"></h1>
        <a id="wa-btn" class="btn" style="background:#25D366; color:white;">Deel via WhatsApp</a>
        <button class="btn" onclick="startSwiping()">Start nu zelf</button>
    </div>

    <div id="room-header" class="hidden">
        <div style="font-size: 8px; color: var(--mint); letter-spacing: 2px;">STOP DECIDING. START DOING.</div>
        <div style="font-weight:800;">CODE: <span id="active-code-display" style="color:var(--mint)"></span></div>
        <div id="timer-display"></div>
    </div>

    <div id="swipe-screen" class="hidden screen-content"></div>

    <div id="join-modal" class="modal-overlay">
        <div class="modal-card">
            <h3>Code Invoeren</h3>
            <input type="number" id="join-code-input" class="input-box">
            <button class="btn" onclick="confirmJoin()">Deelnemen</button>
        </div>
    </div>

    <div id="profile-modal" class="modal-overlay">
        <div class="modal-card">
            <h3 style="color:var(--mint)">Wie ben je?</h3>
            <select id="u-gender" class="select-box">
                <option value="Man">Man</option>
                <option value="Vrouw">Vrouw</option>
                <option value="Anders">Anders</option>
            </select>
            <input type="number" id="u-age" class="input-box" placeholder="Leeftijd">
            <span class="label">Wat is je vibe?</span>
            <div class="chip-container">
                <div class="chip" onclick="toggleInterest(this, 'Cultuur')">🏛️ Cultuur</div>
                <div class="chip" onclick="toggleInterest(this, 'Food')">🍝 Food</div>
                <div class="chip" onclick="toggleInterest(this, 'Actief')">⚡ Actief</div>
            </div>
            <button class="btn" onclick="window.startSwiping()">Start Flippen</button>
        </div>
    </div>
</body>
</html>
