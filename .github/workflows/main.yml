name: 🚀 Deploy naar Mijndomein

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  web-deploy:
    name: 🚚 Uploaden
    runs-on: ubuntu-latest
    steps:
    - name: 🛰️ Haal code op
      uses: actions/checkout@v4

    - name: 📂 Bestanden overzetten
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: ./
        protocol: ftp
        port: 21
        # 'loose' dwingt encryptie af maar is flexibel met certificaten
        security: loose 
        timeout: 60000
