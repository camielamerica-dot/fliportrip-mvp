name: 🚀 Deploy naar Mijndomein

on:
  push:
    branches:
      - main

# Zorgt dat we de nieuwste Node.js versie gebruiken zoals GitHub adviseert
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  web-deploy:
    name: 🚚 Uploaden
    runs-on: ubuntu-latest
    steps:
    - name: 🛰️ Haal code op
      uses: actions/checkout@v4 # Geüpdatet naar v4

    - name: 📂 Bestanden overzetten
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5 # Geüpdatet naar v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: ./
        protocol: ftp
        port: 21
        # 'loose' zorgt ervoor dat hij niet crasht op kleine certificaatfouten van de host
        security: ftps
        timeout: 60000 # Iets meer tijd geven voor de verbinding
