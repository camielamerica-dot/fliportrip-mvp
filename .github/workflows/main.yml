name: 🚀 Deploy naar Mijndomein

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🚚 Uploaden
    runs-on: ubuntu-latest
    steps:
    - name: 🛰️ Haal code op
      uses: actions/checkout@v3

    - name: 📂 Bestanden overzetten via FTPS
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: ./
        protocol: ftps # We zetten het protocol direct op FTPS
        port: 21
        ftp-ssl: true # Forceer SSL
