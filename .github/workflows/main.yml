- name: 📂 Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.flip2trip.nl
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          # DIT IS DE KEY: Ga specifiek naar httpdocs zonder punt of slash ervoor
          server-dir: httpdocs/
          security: loose
