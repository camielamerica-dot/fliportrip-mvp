name: Deploy-Mijndomein

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Haal code op
        uses: actions/checkout@v4

      - name: 📂 Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.flip2trip.nl
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: ./
          # Dit is cruciaal voor Mijndomein:
          security: loose
          # We voegen deze toe om te voorkomen dat de data-socket bevriest:
          log-level: verbose
